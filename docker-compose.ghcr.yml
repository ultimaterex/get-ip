services:
  get-ip:
    image: ghcr.io/ultimaterex/get-ip:latest
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      LOG_FILE: ${LOG_FILE:-}
      GEOLITE_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOLITE_ASN_PATH: /data/GeoLite2-ASN.mmdb
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      GEOLITE_MAX_AGE_DAYS: ${GEOLITE_MAX_AGE_DAYS:-7}
      BLOCKLIST_URLS: ${BLOCKLIST_URLS:-}
      BLOCKLIST_REFRESH: ${BLOCKLIST_REFRESH:-}
      DNSBL_ZONES: ${DNSBL_ZONES:-}
      DNSBL_PER_QUERY: ${DNSBL_PER_QUERY:-}
      DNSBL_DEADLINE: ${DNSBL_DEADLINE:-}
      DNSBL_CONCURRENCY: ${DNSBL_CONCURRENCY:-}
      DNSBL_CACHE_TTL: ${DNSBL_CACHE_TTL:-}
      DNSBL_CLIENT_MAX: ${DNSBL_CLIENT_MAX:-}
      DNSBL_CLIENT_WINDOW: ${DNSBL_CLIENT_WINDOW:-}
      DNSBL_GLOBAL_MAX_PER_MINUTE: ${DNSBL_GLOBAL_MAX_PER_MINUTE:-}
      DNSBL_RL_MAX_CLIENT_KEYS: ${DNSBL_RL_MAX_CLIENT_KEYS:-}
    volumes:
      - get-ip-data:/data
    restart: unless-stopped

volumes:
  get-ip-data:
